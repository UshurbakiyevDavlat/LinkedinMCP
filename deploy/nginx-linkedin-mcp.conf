server {
    listen 80;
    server_name davlat-linkedin.duckdns.org;

    # /sse — SSE endpoint (token-protected)
    location /sse {
        if ($arg_token = "") {
            return 401;
        }
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_buffering off;
        proxy_cache off;
        # SSE requires these headers
        proxy_set_header Cache-Control no-cache;
        add_header X-Accel-Buffering no;
    }

    # /messages — POST endpoint for MCP messages (sessionId = implicit auth)
    location /messages {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30;
    }

    # /health — public health check
    location /health {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
    }
}
# HTTPS block will be added automatically by: certbot --nginx -d davlat-linkedin.duckdns.org
